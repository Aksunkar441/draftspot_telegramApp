services:
  - type: web
    name: sport-meetup-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: WEBHOOK_PATH
        value: /bot/webhook
